name: Build Talos RPi5 WiFi Image

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  # Extensions and imager use v1.12.6.
  # The kernel build uses whatever talos-rpi5/talos-builder targets (currently v1.11.5).
  # See docs/KERNEL-BUILD.md for the version alignment notes.
  TALOS_VERSION: v1.12.6
  REGISTRY: ghcr.io/koorikla
  FIRMWARE_IMAGE: ghcr.io/koorikla/sys-kernel-firmware-wifi
  WPA_IMAGE: ghcr.io/koorikla/wpa-supplicant
  RELEASE_IMAGE: ghcr.io/koorikla/rasberry-wifi

jobs:
  # ─── Stage 1: Kernel ─────────────────────────────────────────────────────────
  # Runs on ubuntu-24.04-arm (native ARM64) — required by the talos-rpi5 build
  # toolchain. The free-tier x86 runner + QEMU would take 6+ hours.
  build-kernel:
    name: Build custom WiFi kernel
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      kernel-image: ${{ steps.capture.outputs.kernel-image }}
      talos-version: ${{ steps.capture.outputs.talos-version }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet /usr/local/share/powershell
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity (required by git am in make patches)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone talos-rpi5/talos-builder
        run: |
          git clone --depth 1 https://github.com/talos-rpi5/talos-builder \
            /tmp/talos-rpi5-builder

      - name: Clone dependencies and apply RPi5 patches
        run: |
          cd /tmp/talos-rpi5-builder
          make checkouts
          make patches

      - name: Apply WiFi kernel config
        run: |
          bash kernel/apply-config.sh \
            /tmp/talos-rpi5-builder/checkouts/pkgs/kernel/build/config-arm64

      - name: Build and push kernel
        run: |
          cd /tmp/talos-rpi5-builder
          # CI_ARGS injects --label into the docker buildx build inside siderolabs/pkgs.
          # The org.opencontainers.image.source label causes GHCR to automatically link
          # the koorikla/kernel package to this repository, which is required for
          # GITHUB_TOKEN to have push permission.
          make kernel \
            REGISTRY=ghcr.io \
            REGISTRY_USERNAME=koorikla \
            PUSH=true \
            PLATFORM=linux/arm64 \
            CI_ARGS="--label org.opencontainers.image.source=https://github.com/koorikla/rasberry-wifi"

      - name: Capture kernel image reference for downstream jobs
        id: capture
        run: |
          PKGS_TAG=$(cd /tmp/talos-rpi5-builder/checkouts/pkgs && \
            git describe --tag --always --dirty --match 'v[0-9]*')
          TALOS_VER=$(grep '^TALOS_VERSION' /tmp/talos-rpi5-builder/Makefile \
            | cut -d'=' -f2 | tr -d ' ')
          echo "kernel-image=ghcr.io/koorikla/kernel:${PKGS_TAG}" >> "$GITHUB_OUTPUT"
          echo "talos-version=${TALOS_VER}" >> "$GITHUB_OUTPUT"
          echo "Kernel image: ghcr.io/koorikla/kernel:${PKGS_TAG}"
          echo "Talos version from talos-rpi5: ${TALOS_VER}"

  # ─── Stage 2: Extensions (parallel, x86 runners with QEMU) ──────────────────
  build-firmware-extension:
    name: Build sys-kernel-firmware-wifi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push firmware extension
        uses: docker/build-push-action@v5
        with:
          context: extensions/sys-kernel-firmware-wifi
          platforms: linux/arm64
          push: true
          tags: ${{ env.FIRMWARE_IMAGE }}:${{ env.TALOS_VERSION }}
          cache-from: type=gha,scope=firmware-ext
          cache-to: type=gha,scope=firmware-ext,mode=max

  build-wpa-extension:
    name: Build wpa-supplicant extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wpa-supplicant extension
        uses: docker/build-push-action@v5
        with:
          context: extensions/wpa-supplicant
          platforms: linux/arm64
          push: true
          tags: ${{ env.WPA_IMAGE }}:${{ env.TALOS_VERSION }}
          cache-from: type=gha,scope=wpa-ext
          cache-to: type=gha,scope=wpa-ext,mode=max

  # ─── Stage 3: Image assembly ─────────────────────────────────────────────────
  build-image:
    name: Assemble metal image
    runs-on: ubuntu-latest
    needs: [build-kernel, build-firmware-extension, build-wpa-extension]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                      /usr/share/dotnet /usr/local/share/powershell
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble metal-arm64 image
        env:
          KERNEL_IMAGE: ${{ needs.build-kernel.outputs.kernel-image }}
          # Use the Talos version that the kernel was actually built against
          KERNEL_TALOS_VERSION: ${{ needs.build-kernel.outputs.talos-version }}
        run: |
          mkdir -p _out
          echo "Kernel image: ${KERNEL_IMAGE}"
          echo "Talos version for imager: ${KERNEL_TALOS_VERSION}"
          docker run --rm \
            --privileged \
            -v /dev:/dev \
            -v ${{ github.workspace }}/_out:/out \
            ghcr.io/siderolabs/imager:${KERNEL_TALOS_VERSION} \
            metal \
            --arch arm64 \
            --board rpi_generic \
            --base-installer-image "${KERNEL_IMAGE}" \
            --system-extension-image ${{ env.FIRMWARE_IMAGE }}:${{ env.TALOS_VERSION }} \
            --system-extension-image ${{ env.WPA_IMAGE }}:${{ env.TALOS_VERSION }} \
            --extra-kernel-arg "console=ttyAMA0,115200"

      - name: List output
        run: ls -lh _out/

      - name: Upload image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-rpi5-wifi-metal-arm64
          path: _out/metal-arm64.raw.xz
          retention-days: 7

      # ── Release: attach to GitHub Release ──────────────────────────────────
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: _out/metal-arm64.raw.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
